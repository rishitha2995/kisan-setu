<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f9f9f9; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; min-height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #FF9800; padding-bottom: 20px; }
        .logout { color: red; text-decoration: none; font-weight: bold; }
        h2 { color: #333; margin-top: 30px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        canvas { max-height: 300px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .stat-card { background: #f5f5f5; padding: 20px; border-radius: 5px; border-left: 4px solid #FF9800; }
        .stat-card h3 { margin: 0 0 10px 0; color: #333; }
        .stat-value { font-size: 28px; font-weight: bold; color: #FF9800; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Admin Analytics Dashboard</h1>
            <a href="/logout?sid={{ sid }}" class="logout">Logout</a>
        </div>

        <h2>💰 Key Metrics</h2>
        <div class="stats">
            <div class="stat-card">
                <h3>Compost Generated</h3>
                <div class="stat-value">{{ sustainability.compost_generated }}kg</div>
            </div>
            <div class="stat-card">
                <h3>Waste Reduction</h3>
                <div class="stat-value">{{ sustainability.waste_reduction }}%</div>
            </div>
        </div>

        <h2>📊 Analytics Charts</h2>
        <div class="charts">
            <div>
                <h3>Price Transparency</h3>
                <canvas id="priceChart"></canvas>
            </div>
            <div>
                <h3>Sales Trends</h3>
                <canvas id="salesChart"></canvas>
            </div>
            <div>
                <h3>Farmer Income</h3>
                <canvas id="incomeChart"></canvas>
            </div>
            <div>
                <h3>Waste Trends</h3>
                <canvas id="wasteChart"></canvas>
            </div>
        </div>

        <script>
            const priceCtx = document.getElementById('priceChart').getContext('2d');
            new Chart(priceCtx, {
                type: 'bar',
                data: {
                    labels: ['Crop1', 'Crop2', 'Crop3'],
                    datasets: [
                        { 
                            label: 'Farmer Price (₹)', 
                            data: {{ price_transparency.farmer_price | tojson }},
                            backgroundColor: '#4CAF50'
                        },
                        { 
                            label: 'Market Price (₹)', 
                            data: {{ price_transparency.market_price | tojson }},
                            backgroundColor: '#2196F3'
                        }
                    ]
                },
                options: { responsive: true }
            });

            const salesCtx = document.getElementById('salesChart').getContext('2d');
            new Chart(salesCtx, {
                type: 'line',
                data: {
                    labels: {{ sales_trends.months | tojson }},
                    datasets: [{
                        label: 'Sales (Units)',
                        data: {{ sales_trends.sales | tojson }},
                        borderColor: '#FF9800',
                        fill: false
                    }]
                },
                options: { responsive: true }
            });

            const incomeCtx = document.getElementById('incomeChart').getContext('2d');
            new Chart(incomeCtx, {
                type: 'bar',
                data: {
                    labels: {{ farmer_income.farmers | tojson }},
                    datasets: [{
                        label: 'Income (₹)',
                        data: {{ farmer_income.income | tojson }},
                        backgroundColor: '#9C27B0'
                    }]
                },
                options: { responsive: true }
            });

            const wasteCtx = document.getElementById('wasteChart').getContext('2d');
            new Chart(wasteCtx, {
                type: 'line',
                data: {
                    labels: {{ waste_trends.months | tojson }},
                    datasets: [{
                        label: 'Waste (kg)',
                        data: {{ waste_trends.waste | tojson }},
                        borderColor: '#f44336',
                        fill: false
                    }]
                },
                options: { responsive: true }
            });
        </script>
    </div>
</body>
</html>

</body>
</html>
