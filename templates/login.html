<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: url('{{ bg_url if bg_url else "/static/images/farm-bg.svg" }}') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            max-width: 420px;
            width: 90%;
            margin: 40px auto;
            background: rgba(255,255,255,0.95);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .credentials {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 5px;
            border: 1px solid #eee;
        }
        .credentials h3 { margin-top: 0; }
        .credentials p { margin: 5px 0; font-size: 14px; }
        form { background: transparent; padding: 0; border: none; }
        label { display: block; margin: 10px 0; }
        input, select { padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: 600; }
        button:hover { background: #45a049; }
        h1 { margin-bottom: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚜 Farm to Market Login</h1>
        

        <form action="/login" method="post">
            <label>Username: 
                <input type="text" name="username" required autofocus>
            </label>
            <label>Password: 
                <input type="password" name="password" required>
            </label>
            <label>Role:
                <select name="role" required>
                    <option value="farmer">Farmer</option>
                    <option value="customer">Customer</option>
                    <option value="admin">Admin</option>
                </select>
            </label>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
